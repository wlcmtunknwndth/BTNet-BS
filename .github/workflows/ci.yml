name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check btnn_bs/

  check:
    name: Import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install (CPU torch + package)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: Verify imports
        run: |
          python -c "import btnn_bs; print('btnn_bs OK')"
          python -c "import torch; print(f'torch {torch.__version__}')"
          python -c "import numpy as np; print(f'numpy {np.__version__}')"

  notebook:
    name: Execute notebook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[quantlib]" nbconvert jupyter scipy matplotlib tqdm torchinfo
      - name: Execute notebook
        run: |
          jupyter nbconvert --to notebook --execute btnn-bs-torch-v4.ipynb \
            --output executed_notebook.ipynb \
            --ExecutePreprocessor.timeout=600
      - uses: actions/upload-artifact@v4
        with:
          name: notebook-output
          path: executed_notebook.ipynb
          retention-days: 7
